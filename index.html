<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Агрофирма: голосовые заказы</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            width: 100%;
            max-width: 800px;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #2c5f2d;
            color: white;
            padding: 16px 20px;
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
            flex-shrink: 0;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f9fafb;
        }
        .message {
            background: white;
            border-radius: 16px;
            padding: 10px 14px;
            border-left: 4px solid #ccc;
        }
        .message.completed {
            background: #d1fae5;
            border-left-color: #10b981;
        }
        .message-text {
            font-size: 0.95rem;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: #6b7280;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .message-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .complete-btn, .undo-btn, .delete-btn, .edit-btn, .save-edit-btn, .cancel-edit-btn {
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
        }
        .complete-btn { background: #10b981; color: white; }
        .undo-btn { background: #f59e0b; color: white; }
        .delete-btn { background: #ef4444; color: white; }
        .edit-btn { background: #3b82f6; color: white; }
        .save-edit-btn { background: #10b981; color: white; }
        .cancel-edit-btn { background: #6b7280; color: white; }
        .edit-textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #10b981;
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            margin-bottom: 8px;
        }
        .input-area {
            padding: 12px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .voice-btn {
            background: #3b82f6;
            border: none;
            color: white;
            font-size: 1.3rem;
            width: 48px;
            height: 48px;
            border-radius: 30px;
            cursor: pointer;
            flex-shrink: 0;
            transition: 0.1s;
            touch-action: manipulation;
            user-select: none;
        }
        .voice-btn.recording {
            background: #ef4444;
            transform: scale(0.95);
        }
        .message-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 24px;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            font-family: inherit;
            min-height: 44px;
            max-height: 100px;
        }
        .send-btn {
            background: #2c5f2d;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }
        .auth-panel {
            padding: 20px;
            text-align: center;
            background: #f3f4f6;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-input {
            padding: 10px;
            margin: 8px;
            border-radius: 30px;
            border: 1px solid #ccc;
            width: 80%;
            max-width: 280px;
        }
        .user-info {
            font-size: 0.8rem;
            padding: 8px 16px;
            background: #eef2ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .user-name {
            font-weight: bold;
            color: #2c5f2d;
        }
        .edit-name-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 0.8rem;
        }
        .logout-btn {
            background: #6b7280;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 0.7rem;
            padding: 4px 12px;
            cursor: pointer;
        }
        hr {
            margin: 15px 0;
        }
        .voice-hint {
            font-size: 0.7rem;
            color: #6b7280;
            text-align: center;
            padding: 4px 12px;
            background: #f3f4f6;
        }
        .loading-indicator {
            font-size: 0.7rem;
            color: #3b82f6;
            text-align: center;
            padding: 4px 12px;
            background: #eef2ff;
            display: none;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="chat-header">🌾 Агрофарм — заказы</div>
    <div id="auth-container"></div>
    <div id="chat-container" style="display: none; flex-direction: column; flex: 1; min-height: 0;">
        <div class="user-info" id="user-info"></div>
        <div class="messages" id="messages-list"></div>
        <div class="input-area">
            <button class="voice-btn" id="voiceBtn">🎤</button>
            <textarea id="messageInput" class="message-input" rows="1" placeholder="Напишите заказ..."></textarea>
            <button class="send-btn" id="sendBtn">Отправить</button>
        </div>
        <div class="voice-hint" id="voiceHint">🎤 Нажмите и удерживайте для записи (телефон) / нажмите для старта и стопа (компьютер)</div>
        <div class="loading-indicator" id="loadingIndicator">🤖 Обработка голоса нейросетью...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDEJMFF6XkYzIVCWkh4WD6InZGINTjgwuc",
        authDomain: "agrochat-e5b53.firebaseapp.com",
        projectId: "agrochat-e5b53",
        storageBucket: "agrochat-e5b53.firebasestorage.app",
        messagingSenderId: "1085969254349",
        appId: "1:1085969254349:web:199f1971921b2686102684"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ordersRef = db.collection('orders');
    const usersRef = db.collection('users');

    let currentUser = null;
    let currentUserName = '';
    let editingMessageId = null;

    const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (navigator.msMaxTouchPoints > 0);

    // ========== ВСТАВЬТЕ ВАШ API-КЛЮЧ ЗДЕСЬ ==========
    const YANDEX_FOLDER_ID = "b1gnt99pva6e5stq6thn";
    const YANDEX_API_KEY = "AQVNxn3SmJ46wxJBolrYHSLw_dgaLoXvSJ5hP_B0";  // ← ВСТАВЬТЕ КЛЮЧ
    // ================================================
    
    let yandexApiKey = YANDEX_API_KEY;

    async function formatWithAI(text) {
        if (!yandexApiKey || yandexApiKey === "ВАШ_API_КЛЮЧ_ВСТАВЬТЕ_СЮДА") {
            console.warn("Нет API-ключа YandexGPT, использую обычное форматирование");
            return formatOrderTextSimple(text);
        }
        
        try {
            const prompt = `Преобразуй этот текст заказа в структурированный список пунктов. 
Правила:
- Если есть название компании/клиента — оставь его в начале
- Разбей перечисление на пункты 1), 2), 3)...
- Убери лишние слова-маркеры (первое, второе, затем, далее и т.д.)
- Исправь явные ошибки распознавания, если они есть
- Ответ дай только в виде текста заказа, без пояснений

Текст заказа: "${text}"`;

            const response = await fetch('https://llm.api.cloud.yandex.net/foundationModels/v1/completion', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Api-Key ${yandexApiKey}`
                },
                body: JSON.stringify({
                    modelUri: `gpt://${YANDEX_FOLDER_ID}/yandexgpt-lite`,
                    completionOptions: {
                        stream: false,
                        temperature: 0.3,
                        maxTokens: 500
                    },
                    messages: [
                        {
                            role: "system",
                            text: "Ты помощник, который структурирует заказы в пункты. Отвечаешь только отформатированным текстом."
                        },
                        {
                            role: "user",
                            text: prompt
                        }
                    ]
                })
            });

            if (!response.ok) {
                console.error('YandexGPT error:', response.status);
                return formatOrderTextSimple(text);
            }

            const data = await response.json();
            const result = data.result?.alternatives?.[0]?.message?.text || text;
            return result;
        } catch (error) {
            console.error('YandexGPT error:', error);
            return formatOrderTextSimple(text);
        }
    }

    // ========== ЗАПАСНАЯ ФУНКЦИЯ (через indexOf) ==========
    function formatOrderTextSimple(text) {
        let result = text;
        let lowerText = text.toLowerCase();
        
        const markers = [
            { words: ['первый', 'первая', 'первое'], num: 1 },
            { words: ['второй', 'вторая', 'второе'], num: 2 },
            { words: ['третий', 'третья', 'третье'], num: 3 },
            { words: ['четвертый', 'четвертая', 'четвертое'], num: 4 },
            { words: ['пятый', 'пятая', 'пятое'], num: 5 },
            { words: ['шестой', 'шестая', 'шестое'], num: 6 },
            { words: ['седьмой', 'седьмая', 'седьмое'], num: 7 },
            { words: ['восьмой', 'восьмая', 'восьмое'], num: 8 },
            { words: ['девятый', 'девятая', 'девятое'], num: 9 },
            { words: ['десятый', 'десятая', 'десятое'], num: 10 }
        ];
        
        let foundMarkers = [];
        for (let m of markers) {
            for (let w of m.words) {
                let pos = lowerText.indexOf(w);
                if (pos === -1) {
                    let wWithYo = w.replace(/е/g, 'ё');
                    pos = lowerText.indexOf(wWithYo);
                    if (pos !== -1) {
                        foundMarkers.push({ word: wWithYo, num: m.num, pos: pos, original: result.substr(pos, wWithYo.length) });
                    }
                } else {
                    foundMarkers.push({ word: w, num: m.num, pos: pos, original: result.substr(pos, w.length) });
                }
            }
        }
        
        let unique = [];
        for (let f of foundMarkers) {
            if (!unique.some(u => u.pos === f.pos)) {
                unique.push(f);
            }
        }
        foundMarkers = unique;
        foundMarkers.sort((a, b) => a.pos - b.pos);
        
        if (foundMarkers.length < 2) {
            return text;
        }
        
        let currentNum = 1;
        for (let marker of foundMarkers) {
            let regex = new RegExp(marker.original.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
            result = result.replace(regex, `\n${currentNum})`);
            currentNum++;
        }
        
        result = result.replace(/\n+/g, '\n').replace(/^\n/, '').trim();
        result = result.replace(/(\d+)\)([^\s])/g, '$1) $2');
        
        let lines = result.split('\n');
        if (lines.length > 1) {
            lines.sort((a, b) => {
                let na = parseInt(a.match(/^\d+/));
                let nb = parseInt(b.match(/^\d+/));
                return na - nb;
            });
            result = lines.join('\n');
        }
        
        return result.includes('\n') ? result : text;
    }

    async function formatOrderText(text, isVoice = false) {
        if (!isVoice) {
            return text;
        }
        return await formatWithAI(text);
    }

    async function getUserName(userId) {
        const doc = await usersRef.doc(userId).get();
        return doc.exists ? doc.data().name : null;
    }

    async function setUserName(userId, name) {
        await usersRef.doc(userId).set({ name: name, email: currentUser.email });
    }

    function renderAuth() {
        const container = document.getElementById('auth-container');
        const chatContainer = document.getElementById('chat-container');
        if (!currentUser) {
            container.style.display = 'flex';
            chatContainer.style.display = 'none';
            container.innerHTML = `
                <div class="auth-panel">
                    <h3>👋 Вход для сотрудников</h3>
                    <input type="text" id="regName" placeholder="Ваше имя" class="login-input">
                    <input type="email" id="loginEmail" placeholder="Email" class="login-input">
                    <input type="password" id="loginPassword" placeholder="Пароль" class="login-input">
                    <button id="registerBtn">📝 Зарегистрироваться</button>
                    <hr>
                    <button id="loginBtn">🔑 Войти</button>
                </div>
            `;
            document.getElementById('registerBtn')?.addEventListener('click', async () => {
                const name = document.getElementById('regName').value.trim();
                const email = document.getElementById('loginEmail').value;
                const pwd = document.getElementById('loginPassword').value;
                if (!name || !email || !pwd) return alert('Заполните все поля');
                try {
                    const userCredential = await auth.createUserWithEmailAndPassword(email, pwd);
                    await setUserName(userCredential.user.uid, name);
                    alert('Регистрация успешна!');
                } catch (err) {
                    alert('Ошибка: ' + err.message);
                }
            });
            document.getElementById('loginBtn')?.addEventListener('click', () => {
                const email = document.getElementById('loginEmail').value;
                const pwd = document.getElementById('loginPassword').value;
                auth.signInWithEmailAndPassword(email, pwd).catch(err => alert(err.message));
            });
        } else {
            container.style.display = 'none';
            chatContainer.style.display = 'flex';
            getUserName(currentUser.uid).then(name => {
                currentUserName = name || currentUser.email.split('@')[0];
                document.getElementById('user-info').innerHTML = `
                    <span>👤 <span class="user-name">${escapeHtml(currentUserName)}</span>
                        <button class="edit-name-btn" id="editNameBtn">✏️</button>
                    </span>
                    <button class="logout-btn" id="logoutBtn">Выйти</button>
                `;
                document.getElementById('editNameBtn')?.addEventListener('click', () => {
                    const newName = prompt('Введите ваше имя:', currentUserName);
                    if (newName?.trim()) {
                        setUserName(currentUser.uid, newName.trim());
                        currentUserName = newName.trim();
                        location.reload();
                    }
                });
                document.getElementById('logoutBtn')?.addEventListener('click', () => auth.signOut());
            });
        }
    }

    auth.onAuthStateChanged(user => {
        currentUser = user;
        renderAuth();
        if (user) listenMessages();
    });

    function autoScroll() {
        const messagesDiv = document.getElementById('messages-list');
        if (messagesDiv) messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function listenMessages() {
        if (window.unsubscribeMessages) window.unsubscribeMessages();
        window.unsubscribeMessages = ordersRef.orderBy('timestamp', 'asc').onSnapshot(async snapshot => {
            const messagesDiv = document.getElementById('messages-list');
            if (!messagesDiv) return;
            
            messagesDiv.innerHTML = '';
            for (const doc of snapshot.docs) {
                const data = doc.data();
                const messageId = doc.id;
                const authorName = data.authorName || data.authorEmail;
                const isAuthor = currentUser && data.authorId === currentUser.uid;
                const isCompleted = data.status === 'completed';
                const isEditing = editingMessageId === messageId;
                
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isCompleted ? 'completed' : ''}`;
                
                if (isEditing) {
                    messageDiv.innerHTML = `
                        <textarea id="edit-${messageId}" class="edit-textarea" rows="3">${escapeHtmlForEdit(data.text)}</textarea>
                        <div style="display:flex; gap:8px;">
                            <button class="save-edit-btn" data-id="${messageId}">💾 Сохранить</button>
                            <button class="cancel-edit-btn" data-id="${messageId}">✖ Отмена</button>
                        </div>
                        <div class="message-meta">
                            <span>📅 ${new Date(data.timestamp?.toDate()).toLocaleString()}</span>
                            <span>👤 ${escapeHtml(authorName)}</span>
                        </div>
                    `;
                } else {
                    let actionsHtml = '';
                    if (!isCompleted) actionsHtml += `<button class="complete-btn" data-id="${messageId}">✅ Выполнено</button>`;
                    else actionsHtml += `<button class="undo-btn" data-id="${messageId}">↩ Отменить</button>`;
                    if (isAuthor) {
                        actionsHtml += `<button class="edit-btn" data-id="${messageId}">✏️ Редактировать</button>`;
                        actionsHtml += `<button class="delete-btn" data-id="${messageId}">🗑 Удалить</button>`;
                    }
                    messageDiv.innerHTML = `
                        <div class="message-text">${escapeHtml(data.text)}</div>
                        <div class="message-meta">
                            <span>📅 ${new Date(data.timestamp?.toDate()).toLocaleString()}</span>
                            <span>👤 ${escapeHtml(authorName)}</span>
                            <div class="message-actions">${actionsHtml}</div>
                        </div>
                    `;
                }
                messagesDiv.appendChild(messageDiv);
            }
            
            document.querySelectorAll('.complete-btn').forEach(btn => btn.addEventListener('click', async (e) => {
                await ordersRef.doc(btn.getAttribute('data-id')).update({ status: 'completed' });
            }));
            document.querySelectorAll('.undo-btn').forEach(btn => btn.addEventListener('click', async (e) => {
                await ordersRef.doc(btn.getAttribute('data-id')).update({ status: 'active' });
            }));
            document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', async (e) => {
                if (confirm('Удалить заказ?')) await ordersRef.doc(btn.getAttribute('data-id')).delete();
            }));
            document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', (e) => {
                editingMessageId = btn.getAttribute('data-id');
                listenMessages();
            }));
            document.querySelectorAll('.save-edit-btn').forEach(btn => btn.addEventListener('click', async (e) => {
                const id = btn.getAttribute('data-id');
                const newText = document.getElementById(`edit-${id}`).value.trim();
                if (newText) await ordersRef.doc(id).update({ text: await formatOrderText(newText, false) });
                editingMessageId = null;
                listenMessages();
            }));
            document.querySelectorAll('.cancel-edit-btn').forEach(btn => btn.addEventListener('click', (e) => {
                editingMessageId = null;
                listenMessages();
            }));
            
            autoScroll();
        });
    }

    async function sendMessage(text, isVoice = false) {
        if (!text.trim() || !currentUser) return;
        
        let finalText = text;
        
        if (isVoice) {
            const loader = document.getElementById('loadingIndicator');
            if (loader) loader.style.display = 'block';
            try {
                finalText = await formatOrderText(text, true);
            } finally {
                if (loader) loader.style.display = 'none';
            }
        } else {
            finalText = text;
        }
        
        await ordersRef.add({
            text: finalText,
            authorId: currentUser.uid,
            authorName: currentUserName,
            authorEmail: currentUser.email,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            status: 'active'
        });
    }

    // ========== ГОЛОСОВОЙ ВВОД ==========
    let recognition = null;
    let isRecording = false;
    let finalTranscript = '';
    
    const voiceBtn = document.getElementById('voiceBtn');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const voiceHint = document.getElementById('voiceHint');

    function startRecording() {
        if (!recognition) {
            alert('Голосовой ввод не поддерживается');
            return;
        }
        if (isRecording) return;
        finalTranscript = '';
        if (messageInput) messageInput.value = '';
        recognition.start();
    }

    function stopRecording() {
        if (!recognition) return;
        if (isRecording) {
            recognition.stop();
        }
    }

    function initSpeech() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            if (voiceBtn) {
                voiceBtn.style.opacity = '0.5';
                voiceBtn.disabled = true;
            }
            if (voiceHint) voiceHint.textContent = '❌ Голосовой ввод не поддерживается в этом браузере';
            return;
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.interimResults = false;
        recognition.continuous = true;
        
        recognition.onstart = () => {
            isRecording = true;
            if (voiceBtn) {
                voiceBtn.classList.add('recording');
            }
            if (voiceHint) {
                if (isTouchDevice) {
                    voiceHint.textContent = '🎙️ Запись... отпустите кнопку для остановки';
                } else {
                    voiceHint.textContent = '🎙️ Идёт запись... нажмите 🎤 ещё раз, чтобы остановить';
                }
            }
        };
        
        recognition.onend = () => {
            isRecording = false;
            if (voiceBtn) {
                voiceBtn.classList.remove('recording');
            }
            if (voiceHint) {
                if (isTouchDevice) {
                    voiceHint.textContent = '🎤 Нажмите и удерживайте для записи';
                } else {
                    voiceHint.textContent = '🎤 Нажмите для старта записи, нажмите ещё раз для остановки';
                }
            }
            
            if (finalTranscript.trim() && messageInput) {
                const voiceText = finalTranscript.trim();
                messageInput.value = voiceText;
                finalTranscript = '';
                autoResize(messageInput);
                sendMessage(voiceText, true);
                messageInput.value = '';
                autoResize(messageInput);
            }
        };
        
        recognition.onresult = (event) => {
            let newText = '';
            for (let i = 0; i < event.results.length; i++) {
                if (event.results[i].isFinal) {
                    newText += event.results[i][0].transcript + ' ';
                }
            }
            if (newText) {
                finalTranscript += newText;
                if (messageInput) {
                    messageInput.value = finalTranscript.trim();
                    autoResize(messageInput);
                }
            }
        };
        
        recognition.onerror = (event) => {
            console.error('Speech error:', event.error);
            if (event.error === 'not-allowed') {
                alert('Разрешите доступ к микрофону в настройках браузера');
            } else if (event.error === 'network') {
                alert('Ошибка сети. Проверьте интернет');
            }
            if (isRecording) {
                try { recognition.stop(); } catch(e) {}
            }
        };
    }
    
    function autoResize(textarea) {
        if (!textarea) return;
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
    }
    
    function setupVoiceHandlers() {
        if (!voiceBtn || !recognition) return;
        
        if (isTouchDevice) {
            voiceBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                startRecording();
            });
            voiceBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                stopRecording();
            });
            voiceBtn.addEventListener('touchcancel', (e) => {
                e.preventDefault();
                stopRecording();
            });
        } else {
            voiceBtn.addEventListener('click', () => {
                if (isRecording) {
                    stopRecording();
                } else {
                    startRecording();
                }
            });
        }
    }
    
    if (sendBtn) {
        sendBtn.addEventListener('click', () => {
            if (messageInput?.value.trim()) {
                sendMessage(messageInput.value, false);
                messageInput.value = '';
                autoResize(messageInput);
                finalTranscript = '';
            }
        });
    }
    
    if (messageInput) {
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                if (sendBtn) sendBtn.click();
            }
        });
        messageInput.addEventListener('input', () => autoResize(messageInput));
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;').replace(/\n/g, '<br>');
    }
    
    function escapeHtmlForEdit(str) {
        if (!str) return '';
        return str.replace(/<br>/g, '\n');
    }
    
    initSpeech();
    setupVoiceHandlers();
</script>
</body>
</html>
