<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Агрофирма: голосовые заказы</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
        }
        .app {
            max-width: 800px;
            width: 100%;
            height: 95vh;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 10px;
        }
        .chat-header {
            background: #2c5f2d;
            color: white;
            padding: 16px 20px;
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
            flex-shrink: 0;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f9fafb;
        }
        .message {
            background: white;
            border-radius: 16px;
            padding: 10px 14px;
            border-left: 4px solid #ccc;
        }
        .message.completed {
            background: #d1fae5;
            border-left-color: #10b981;
        }
        .message-text {
            font-size: 0.95rem;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: #6b7280;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .message-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .complete-btn, .undo-btn, .delete-btn, .edit-btn, .save-edit-btn, .cancel-edit-btn {
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
        }
        .complete-btn { background: #10b981; color: white; }
        .undo-btn { background: #f59e0b; color: white; }
        .delete-btn { background: #ef4444; color: white; }
        .edit-btn { background: #3b82f6; color: white; }
        .save-edit-btn { background: #10b981; color: white; }
        .cancel-edit-btn { background: #6b7280; color: white; }
        .edit-textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #10b981;
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            margin-bottom: 8px;
        }
        .input-area {
            padding: 12px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .voice-btn {
            background: #3b82f6;
            border: none;
            color: white;
            font-size: 1.3rem;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .voice-btn.recording {
            background: #ef4444;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .message-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 24px;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            font-family: inherit;
            min-height: 44px;
            max-height: 100px;
        }
        .send-btn {
            background: #2c5f2d;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }
        .auth-panel {
            padding: 20px;
            text-align: center;
            background: #f3f4f6;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-input {
            padding: 10px;
            margin: 8px;
            border-radius: 30px;
            border: 1px solid #ccc;
            width: 80%;
            max-width: 280px;
        }
        .user-info {
            font-size: 0.8rem;
            padding: 8px 16px;
            background: #eef2ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .user-name {
            font-weight: bold;
            color: #2c5f2d;
        }
        .edit-name-btn, .logout-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
        }
        .logout-btn {
            background: #6b7280;
            color: white;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        button {
            cursor: pointer;
        }
        hr {
            margin: 15px 0;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="chat-header">🌾 Агрофарм — заказы</div>
    <div id="auth-container"></div>
    <div id="chat-container" style="display: none; flex-direction: column; flex: 1; min-height: 0;">
        <div class="user-info" id="user-info"></div>
        <div class="messages" id="messages-list"></div>
        <div class="input-area">
            <button class="voice-btn" id="voiceBtn">🎤</button>
            <textarea id="messageInput" class="message-input" rows="1" placeholder="Напишите или надиктуйте заказ..."></textarea>
            <button class="send-btn" id="sendBtn">Отправить</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDEJMFF6XkYzIVCWkh4WD6InZGINTjgwuc",
        authDomain: "agrochat-e5b53.firebaseapp.com",
        projectId: "agrochat-e5b53",
        storageBucket: "agrochat-e5b53.firebasestorage.app",
        messagingSenderId: "1085969254349",
        appId: "1:1085969254349:web:199f1971921b2686102684"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ordersRef = db.collection('orders');
    const usersRef = db.collection('users');

    let currentUser = null;
    let currentUserName = '';
    let editingMessageId = null;

    async function getUserName(userId) {
        const doc = await usersRef.doc(userId).get();
        return doc.exists ? doc.data().name : null;
    }

    async function setUserName(userId, name) {
        await usersRef.doc(userId).set({ name: name, email: currentUser.email });
    }

    function renderAuth() {
        const container = document.getElementById('auth-container');
        const chatContainer = document.getElementById('chat-container');
        if (!currentUser) {
            container.style.display = 'flex';
            chatContainer.style.display = 'none';
            container.innerHTML = `
                <div class="auth-panel">
                    <h3>👋 Вход для сотрудников</h3>
                    <input type="text" id="regName" placeholder="Ваше имя" class="login-input">
                    <input type="email" id="loginEmail" placeholder="Email" class="login-input">
                    <input type="password" id="loginPassword" placeholder="Пароль" class="login-input">
                    <button id="registerBtn">📝 Зарегистрироваться</button>
                    <hr>
                    <button id="loginBtn">🔑 Войти</button>
                </div>
            `;
            document.getElementById('registerBtn')?.addEventListener('click', async () => {
                const name = document.getElementById('regName').value.trim();
                const email = document.getElementById('loginEmail').value;
                const pwd = document.getElementById('loginPassword').value;
                if (!name || !email || !pwd) return alert('Заполните все поля');
                try {
                    const userCredential = await auth.createUserWithEmailAndPassword(email, pwd);
                    await setUserName(userCredential.user.uid, name);
                    alert('Регистрация успешна!');
                } catch (err) {
                    alert('Ошибка: ' + err.message);
                }
            });
            document.getElementById('loginBtn')?.addEventListener('click', () => {
                const email = document.getElementById('loginEmail').value;
                const pwd = document.getElementById('loginPassword').value;
                auth.signInWithEmailAndPassword(email, pwd).catch(err => alert(err.message));
            });
        } else {
            container.style.display = 'none';
            chatContainer.style.display = 'flex';
            getUserName(currentUser.uid).then(name => {
                currentUserName = name || currentUser.email.split('@')[0];
                document.getElementById('user-info').innerHTML = `
                    <span>👤 <span class="user-name">${escapeHtml(currentUserName)}</span>
                        <button class="edit-name-btn" id="editNameBtn">✏️</button>
                    </span>
                    <button class="logout-btn" id="logoutBtn">Выйти</button>
                `;
                document.getElementById('editNameBtn')?.addEventListener('click', () => {
                    const newName = prompt('Введите ваше имя:', currentUserName);
                    if (newName?.trim()) {
                        setUserName(currentUser.uid, newName.trim());
                        currentUserName = newName.trim();
                        location.reload();
                    }
                });
                document.getElementById('logoutBtn')?.addEventListener('click', () => auth.signOut());
            });
        }
    }

    auth.onAuthStateChanged(user => {
        currentUser = user;
        renderAuth();
        if (user) listenMessages();
    });

    function autoScroll() {
        const messagesDiv = document.getElementById('messages-list');
        if (messagesDiv) messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function listenMessages() {
        if (window.unsubscribeMessages) window.unsubscribeMessages();
        window.unsubscribeMessages = ordersRef.orderBy('timestamp', 'asc').onSnapshot(async snapshot => {
            const messagesDiv = document.getElementById('messages-list');
            if (!messagesDiv) return;
            
            messagesDiv.innerHTML = '';
            for (const doc of snapshot.docs) {
                const data = doc.data();
                const messageId = doc.id;
                const authorName = data.authorName || data.authorEmail;
                const isAuthor = currentUser && data.authorId === currentUser.uid;
                const isCompleted = data.status === 'completed';
                const isEditing = editingMessageId === messageId;
                
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isCompleted ? 'completed' : ''}`;
                
                if (isEditing) {
                    messageDiv.innerHTML = `
                        <textarea id="edit-${messageId}" class="edit-textarea" rows="3">${escapeHtmlForEdit(data.text)}</textarea>
                        <div style="display:flex; gap:8px;">
                            <button class="save-edit-btn" data-id="${messageId}">💾 Сохранить</button>
                            <button class="cancel-edit-btn" data-id="${messageId}">✖ Отмена</button>
                        </div>
                        <div class="message-meta">
                            <span>📅 ${new Date(data.timestamp?.toDate()).toLocaleString()}</span>
                            <span>👤 ${escapeHtml(authorName)}</span>
                        </div>
                    `;
                } else {
                    let actionsHtml = '';
                    if (!isCompleted) actionsHtml += `<button class="complete-btn" data-id="${messageId}">✅ Выполнено</button>`;
                    else actionsHtml += `<button class="undo-btn" data-id="${messageId}">↩ Отменить</button>`;
                    if (isAuthor) {
                        actionsHtml += `<button class="edit-btn" data-id="${messageId}">✏️ Редактировать</button>`;
                        actionsHtml += `<button class="delete-btn" data-id="${messageId}">🗑 Удалить</button>`;
                    }
                    messageDiv.innerHTML = `
                        <div class="message-text">${escapeHtml(data.text)}</div>
                        <div class="message-meta">
                            <span>📅 ${new Date(data.timestamp?.toDate()).toLocaleString()}</span>
                            <span>👤 ${escapeHtml(authorName)}</span>
                            <div class="message-actions">${actionsHtml}</div>
                        </div>
                    `;
                }
                messagesDiv.appendChild(messageDiv);
            }
            
            document.querySelectorAll('.complete-btn').forEach(btn => btn.addEventListener('click', async (e) => {
                await ordersRef.doc(btn.getAttribute('data-id')).update({ status: 'completed' });
            }));
            document.querySelectorAll('.undo-btn').forEach(btn => btn.addEventListener('click', async (e) => {
                await ordersRef.doc(btn.getAttribute('data-id')).update({ status: 'active' });
            }));
            document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', async (e) => {
                if (confirm('Удалить заказ?')) await ordersRef.doc(btn.getAttribute('data-id')).delete();
            }));
            document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', (e) => {
                editingMessageId = btn.getAttribute('data-id');
                listenMessages();
            }));
            document.querySelectorAll('.save-edit-btn').forEach(btn => btn.addEventListener('click', async (e) => {
                const id = btn.getAttribute('data-id');
                const newText = document.getElementById(`edit-${id}`).value.trim();
                if (newText) await ordersRef.doc(id).update({ text: formatOrderText(newText) });
                editingMessageId = null;
                listenMessages();
            }));
            document.querySelectorAll('.cancel-edit-btn').forEach(btn => btn.addEventListener('click', (e) => {
                editingMessageId = null;
                listenMessages();
            }));
            
            autoScroll();
        });
    }

    async function sendMessage(text) {
        if (!text.trim() || !currentUser) return;
        await ordersRef.add({
            text: formatOrderText(text.trim()),
            authorId: currentUser.uid,
            authorName: currentUserName,
            authorEmail: currentUser.email,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            status: 'active'
        });
    }

    function formatOrderText(text) {
        const hasNumbers = /(\d+)\s+/.test(text);
        const hasWords = /(первый|второй|третий|четвертый|пятый|шестой|седьмой|восьмой|девятый|десятый)/i.test(text);
        if (!hasNumbers && !hasWords) return text;
        
        let result = text;
        if (hasNumbers) {
            const parts = result.split(/(\d+)/);
            let newParts = [];
            for (let i = 0; i < parts.length; i++) {
                if (/^\d+$/.test(parts[i])) newParts.push(`\n${parts[i]})`);
                else if (parts[i].trim()) newParts.push(parts[i]);
            }
            result = newParts.join('').trim();
        }
        
        const words = ['первый','второй','третий','четвертый','пятый','шестой','седьмой','восьмой','девятый','десятый'];
        let num = 1;
        for (const word of words) {
            const regex = new RegExp(word, 'gi');
            if (regex.test(result)) {
                result = result.replace(regex, `\n${num})`);
                num++;
            }
        }
        
        result = result.replace(/\n+/g, '\n').replace(/^\n/, '').trim();
        result = result.replace(/(\d+)\)([^\s])/g, '$1) $2');
        return result.includes('\n') ? result : text;
    }

    // Голосовой ввод
    let recognition = null;
    let isRecording = false;
    let finalTranscript = '';
    const voiceBtn = document.getElementById('voiceBtn');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function initSpeech() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            if (voiceBtn) voiceBtn.style.opacity = '0.5';
            return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.interimResults = false;
        recognition.continuous = true;
        
        recognition.onstart = () => {
            isRecording = true;
            if (voiceBtn) {
                voiceBtn.classList.add('recording');
                voiceBtn.textContent = '⏹️';
            }
        };
        recognition.onend = () => {
            isRecording = false;
            if (voiceBtn) {
                voiceBtn.classList.remove('recording');
                voiceBtn.textContent = '🎤';
            }
            if (finalTranscript.trim() && messageInput) {
                messageInput.value = finalTranscript.trim();
                finalTranscript = '';
                autoResize(messageInput);
            }
        };
        recognition.onresult = (event) => {
            let newText = '';
            for (let i = 0; i < event.results.length; i++) {
                if (event.results[i].isFinal) newText += event.results[i][0].transcript + ' ';
            }
            if (newText) {
                finalTranscript += newText;
                if (messageInput) messageInput.value = finalTranscript.trim();
            }
        };
        recognition.onerror = () => { if (isRecording) recognition.stop(); };
    }
    
    function autoResize(textarea) {
        if (!textarea) return;
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
    }
    
    if (voiceBtn) {
        voiceBtn.addEventListener('click', () => {
            if (!recognition) return alert('Голосовой ввод не поддерживается');
            if (isRecording) recognition.stop();
            else {
                finalTranscript = '';
                if (messageInput) messageInput.value = '';
                recognition.start();
            }
        });
    }
    
    if (sendBtn) {
        sendBtn.addEventListener('click', () => {
            if (messageInput?.value.trim()) {
                sendMessage(messageInput.value);
                messageInput.value = '';
                autoResize(messageInput);
                finalTranscript = '';
            }
        });
    }
    
    if (messageInput) {
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                if (sendBtn) sendBtn.click();
            }
        });
        messageInput.addEventListener('input', () => autoResize(messageInput));
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;').replace(/\n/g, '<br>');
    }
    function escapeHtmlForEdit(str) {
        if (!str) return '';
        return str.replace(/<br>/g, '\n');
    }
    
    initSpeech();
</script>
</body>
</html>
